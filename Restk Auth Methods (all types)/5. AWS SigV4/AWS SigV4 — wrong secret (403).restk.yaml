# Restk Request
id: "336440314646413326"
name: AWS SigV4 — wrong secret (403)
description: 'Negative: app signs with a bad secret → oracle returns 403 + the expected/received signatures.'
method: POST
url: "{{base_url}}/auth/awssigv4"
order: 2
body:
    json: |-
        {
          "hello": "world"
        }
auth:
    awssigv4:
        accessKey: AKIDEXAMPLE
        region: us-east-1
        service: execute-api
scripts:
    postResponse: |-
        nova.test("status 403", function () { nova.expect(nova.response.status).toBe(403); });
