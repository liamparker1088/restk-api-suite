# Restk Request
id: "336440314650607618"
name: OAuth2 — client_credentials
description: 'OAuth2 client_credentials. FIRST click ''Get Token'' in the Auth tab (the app does NOT auto-fetch on Send) — it fetches an access_token from the Access Token URL and stores it. THEN Send: the token is attached as Bearer and the protected oracle 200s. (Sending before fetching returns 401 invalid_token — that means no token was fetched, not a server error.)'
method: GET
url: "{{base_url}}/auth/oauth2/protected"
order: 1
auth: none
scripts:
    postResponse: |-
        nova.test("status 200", function () { nova.expect(nova.response.status).toBe(200); });
        nova.test("protected resource reached", function () { nova.expect(nova.response.status).toBe(200); });
