# Restk Request
id: "336440318593253382"
name: DELETE -http-method-DELETE
description: Sends a DELETE to `/http/method/DELETE` with no body and confirms the server records the verb as DELETE. Verifies the client can issue a bodyless verb correctly. Returns 200 with a JSON echo of the received method.
intent:
    whenToUse: Confirming DELETE is transmitted correctly without a request body.
    preconditions:
        - base_url must resolve to a running Restk test server.
    commonNextSteps:
        - Check the 404 request in Status Codes for how deleting a missing resource should read.
    doNotUseFor: Verifying cascade or soft-delete behaviour — this route is a pure echo.
method: DELETE
url: "{{base_url}}/http/method/DELETE"
order: 5
scripts:
    postResponse: |
        nova.test("status 200", function () { nova.expect(nova.response.status).toBe(200); });
