# Restk Request
id: "336440318597447693"
name: 307 preserves method + body
method: POST
url: "{{base_url}}/http/redirect-preserve"
order: 2
body:
    json: |-
        {
          "kept": true
        }
scripts:
    postResponse: |-
        nova.test("status 200", function () { nova.expect(nova.response.status).toBe(200); });
        nova.test("POST preserved across 307", function () { nova.expect(nova.response.json().method).toBe("POST"); nova.expect(nova.response.json().json.kept).toBe(true); });
