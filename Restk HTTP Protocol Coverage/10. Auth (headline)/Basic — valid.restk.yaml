# Restk Request
id: "336440318597447715"
name: Basic — valid
description: 'Calls `/auth/basic` with HTTP Basic credentials. Confirms the client base64-encodes the username and password correctly into the `Authorization: Basic` header. Returns 200 when the credentials are accepted.'
intent:
    whenToUse: Verifying HTTP Basic auth encoding and acceptance.
    preconditions:
        - base_url must resolve to a running Restk test server.
        - A username and password must be configured on the Auth tab.
    commonNextSteps:
        - Change the password and resend to confirm the server returns 401.
    doNotUseFor: Token-based schemes — use the Bearer request.
method: GET
url: "{{base_url}}/auth/basic"
order: 3
params:
    - {id: "EA929723-7092-4F5F-BC30-30C93F7637A0", key: user, value: qa, order: 0}
    - {id: "6F0BBD35-5522-423D-AEBE-D4FDD17AADF5", key: pass, value: secret, order: 1}
auth:
    basic:
        username: qa
scripts:
    postResponse: |
        nova.test("status 200", function () { nova.expect(nova.response.status).toBe(200); });
