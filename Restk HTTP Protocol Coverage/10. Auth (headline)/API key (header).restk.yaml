# Restk Request
id: "336440318597447716"
name: API key (header)
description: Calls `/auth/apikey` with an API key supplied as a request header. Confirms the client places the key in the header rather than the query string, and that the header name matches what the server expects. Returns 200 when the key is accepted.
intent:
    whenToUse: Verifying header-based API key auth is transmitted correctly.
    preconditions:
        - base_url must resolve to a running Restk test server.
        - An API key and header name must be configured on the Auth tab.
    commonNextSteps:
        - Switch the key location from header to query and confirm the server rejects it.
    doNotUseFor: Bearer or Basic schemes — those have their own requests in this folder.
method: GET
url: "{{base_url}}/auth/apikey"
order: 4
params:
    - {id: "3161C25F-8A73-4886-87CF-F62B6944A03F", key: header, value: X-API-Key, order: 0}
    - {id: "0E35E8DE-0A69-4722-BEDC-CF41084FF9ED", key: expected, value: key-123, order: 1}
auth:
    apikey:
        in: header
        name: X-API-Key
scripts:
    postResponse: |
        nova.test("status 200", function () { nova.expect(nova.response.status).toBe(200); });
